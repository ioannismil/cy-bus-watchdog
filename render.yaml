services:
  - type: web
    name: cyprus-bus-tracker
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: GTFS_RT_URL
        value: "http://20.19.98.194:8328/Api/api/gtfs-realtime"
