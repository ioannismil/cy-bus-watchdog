<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyprus Bus Tracker - Live</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --sidebar-width: 360px;
            --bg-dark: #0a0f1a;
            --bg-card: #131a2b;
            --bg-elevated: #1a2236;
            --bg-hover: #1f2b42;
            --bg-input: #111827;
            --border: rgba(255,255,255,0.07);
            --border-light: rgba(255,255,255,0.12);
            --text: #f1f5f9;
            --text-secondary: #8b95a8;
            --text-dim: #5a6478;
            --primary: #38bdf8;
            --primary-glow: rgba(56,189,248,0.15);
            --green: #34d399;
            --amber: #fbbf24;
            --red: #f87171;
            --purple: #a78bfa;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.4);
            --shadow-lg: 0 8px 30px rgba(0,0,0,0.5);
            --transition: 200ms ease-out;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, 'Segoe UI', sans-serif;
            display: flex;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            background: var(--bg-dark);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
        }

        /* ============ SIDEBAR ============ */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--bg-dark);
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
            z-index: 1000;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 20px 20px 16px;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-title-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
        }

        .sidebar-brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .brand-icon {
            width: 36px;
            height: 36px;
            border-radius: var(--radius-sm);
            background: linear-gradient(135deg, var(--primary), #818cf8);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            flex-shrink: 0;
        }

        .brand-text h1 {
            font-size: 1.05rem;
            font-weight: 700;
            letter-spacing: -0.3px;
            line-height: 1.2;
        }

        .brand-text .live-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--green);
            margin-top: 2px;
        }

        .live-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--green);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(52,211,153,0.5); }
            50% { opacity: 0.7; box-shadow: 0 0 0 6px rgba(52,211,153,0); }
        }

        .sidebar-close {
            display: none;
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.5rem;
            cursor: pointer;
            width: 36px;
            height: 36px;
            border-radius: var(--radius-sm);
            transition: all var(--transition);
            line-height: 1;
        }
        .sidebar-close:hover { background: var(--bg-hover); color: var(--text); }

        .stats-row {
            display: flex;
            gap: 8px;
        }

        .stat-card {
            flex: 1;
            background: var(--bg-card);
            border-radius: var(--radius-md);
            padding: 10px 12px;
            text-align: center;
            border: 1px solid var(--border);
        }

        .stat-card .stat-value {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text);
            line-height: 1.2;
        }

        .stat-card .stat-label {
            font-size: 0.65rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 2px;
        }

        /* ============ ERROR BANNER ============ */
        .error-banner {
            display: none;
            padding: 10px 16px;
            background: rgba(248,113,113,0.1);
            border-bottom: 1px solid rgba(248,113,113,0.2);
            color: var(--red);
            font-size: 0.8rem;
            font-weight: 500;
        }
        .error-banner.show { display: block; }

        /* ============ CONTROLS ============ */
        .controls {
            padding: 14px 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            border-bottom: 1px solid var(--border);
        }

        .search-wrapper {
            position: relative;
        }

        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
            pointer-events: none;
            width: 16px;
            height: 16px;
        }

        .search-box {
            width: 100%;
            padding: 10px 14px 10px 38px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            color: var(--text);
            font-size: 0.85rem;
            font-family: inherit;
            outline: none;
            transition: all var(--transition);
        }
        .search-box::placeholder { color: var(--text-dim); }
        .search-box:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-glow);
        }

        .toggle-row {
            display: flex;
            gap: 6px;
        }

        .toggle-btn {
            flex: 1;
            padding: 7px 10px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-dim);
            font-size: 0.75rem;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            transition: all var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
        .toggle-btn:hover { background: var(--bg-hover); color: var(--text-secondary); }
        .toggle-btn.active {
            background: var(--bg-elevated);
            border-color: var(--primary);
            color: var(--primary);
        }

        .toggle-btn .icon {
            width: 14px;
            height: 14px;
            flex-shrink: 0;
        }

        .region-filters {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }

        .region-btn {
            padding: 5px 10px;
            border-radius: 100px;
            border: none;
            font-size: 0.7rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all var(--transition);
            opacity: 0.35;
            filter: saturate(0.5);
        }
        .region-btn.active {
            opacity: 1;
            filter: saturate(1);
        }
        .region-btn:hover { opacity: 0.85; }

        /* ============ BUS LIST ============ */
        .bus-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .bus-list::-webkit-scrollbar { width: 4px; }
        .bus-list::-webkit-scrollbar-track { background: transparent; }
        .bus-list::-webkit-scrollbar-thumb { background: var(--bg-hover); border-radius: 4px; }

        .bus-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all var(--transition);
            border: 1px solid transparent;
        }
        .bus-item:hover {
            background: var(--bg-card);
            border-color: var(--border);
        }
        .bus-item.selected {
            background: var(--primary-glow);
            border-color: rgba(56,189,248,0.25);
        }

        .bus-icon {
            width: 38px;
            height: 38px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            flex-shrink: 0;
        }

        .bus-info {
            flex: 1;
            min-width: 0;
        }

        .bus-label {
            font-weight: 600;
            font-size: 0.85rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .bus-route {
            font-size: 0.72rem;
            color: var(--text-secondary);
            margin-top: 1px;
        }

        .bus-speed {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--green);
            white-space: nowrap;
            padding: 3px 8px;
            border-radius: 100px;
            background: rgba(52,211,153,0.1);
        }
        .bus-speed.stopped {
            color: var(--text-dim);
            background: rgba(90,100,120,0.15);
        }
        .bus-speed.fast {
            color: var(--amber);
            background: rgba(251,191,36,0.1);
        }

        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            gap: 12px;
            color: var(--text-dim);
            font-size: 0.85rem;
        }

        .spinner {
            width: 28px;
            height: 28px;
            border: 3px solid var(--bg-hover);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ============ REFRESH BAR ============ */
        .refresh-section {
            border-top: 1px solid var(--border);
        }

        .refresh-progress {
            height: 2px;
            background: var(--bg-card);
        }

        .refresh-progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--primary), #818cf8);
            transition: width 1s linear;
            border-radius: 0 2px 2px 0;
        }

        .refresh-bar {
            display: flex;
            justify-content: space-between;
            padding: 10px 16px;
            font-size: 0.72rem;
            color: var(--text-dim);
        }

        .countdown {
            font-weight: 700;
            color: var(--primary);
            font-variant-numeric: tabular-nums;
        }

        /* ============ MAP ============ */
        .map-container {
            flex: 1;
            position: relative;
        }

        #map {
            width: 100%;
            height: 100%;
        }

        /* ============ BUS MARKERS ============ */
        .bus-marker {
            width: 28px;
            height: 28px;
            border-radius: 50% 50% 50% 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.75rem;
            color: #fff;
            border: 2px solid rgba(255,255,255,0.25);
            box-shadow: var(--shadow-md);
            transition: box-shadow 0.3s ease-out;
            font-family: 'Inter', sans-serif;
        }

        .bus-marker.moving {
            border-color: rgba(255,255,255,0.5);
        }

        /* ============ POPUPS ============ */
        .leaflet-popup-content-wrapper {
            background: rgba(19,26,43,0.95) !important;
            backdrop-filter: blur(16px) saturate(1.5);
            -webkit-backdrop-filter: blur(16px) saturate(1.5);
            border-radius: var(--radius-lg) !important;
            border: 1px solid var(--border-light) !important;
            box-shadow: var(--shadow-lg), 0 0 0 1px rgba(0,0,0,0.3) !important;
            color: var(--text) !important;
            padding: 0 !important;
        }

        .leaflet-popup-content {
            margin: 0 !important;
            font-family: 'Inter', -apple-system, sans-serif !important;
            font-size: 13px !important;
            line-height: 1.5 !important;
        }

        .leaflet-popup-tip {
            background: rgba(19,26,43,0.95) !important;
            border: 1px solid var(--border-light) !important;
            box-shadow: none !important;
        }

        .popup-content {
            padding: 16px;
        }

        .popup-content h3 {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .popup-grid {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 6px 14px;
            font-size: 0.82rem;
        }

        .popup-grid .label {
            color: var(--text-dim);
            font-weight: 500;
        }

        .popup-grid .value {
            font-weight: 600;
            text-align: right;
        }

        /* ============ STOP MARKERS ============ */
        .stop-marker {
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.6);
        }

        /* ============ STOP POPUPS ============ */
        .stop-popup { padding: 14px; }

        .stop-popup-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 6px;
        }
        .stop-popup-header strong {
            font-size: 0.9rem;
        }
        .stop-popup-code {
            font-size: 0.65rem;
            background: var(--bg-hover);
            padding: 2px 7px;
            border-radius: 100px;
            color: var(--text-secondary);
            font-weight: 500;
            white-space: nowrap;
        }

        .stop-arrivals-label {
            font-size: 0.7rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
            margin-bottom: 8px;
            padding-bottom: 6px;
            border-bottom: 1px solid var(--border);
        }

        .stop-arrival-row {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 5px 0;
            font-size: 0.8rem;
        }
        .stop-arrival-row + .stop-arrival-row {
            border-top: 1px solid rgba(255,255,255,0.04);
        }

        .stop-route-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 50px;
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 700;
            color: #fff;
        }

        .stop-vehicle {
            flex: 1;
            color: var(--text-secondary);
            font-size: 0.75rem;
        }

        .stop-eta {
            font-weight: 700;
            color: var(--green);
            font-size: 0.8rem;
            white-space: nowrap;
        }
        .stop-eta.at-stop {
            color: var(--primary);
        }

        .stop-no-arrivals {
            color: var(--text-dim);
            font-size: 0.8rem;
            padding: 8px 0;
            text-align: center;
        }

        /* ============ MOBILE TOGGLE ============ */
        .mobile-toggle {
            display: none;
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 1100;
            width: 48px;
            height: 48px;
            border-radius: var(--radius-md);
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            box-shadow: var(--shadow-lg);
            backdrop-filter: blur(10px);
            color: var(--text);
            font-size: 0;
            cursor: pointer;
            transition: all var(--transition);
            align-items: center;
            justify-content: center;
        }
        .mobile-toggle:hover { background: var(--bg-hover); }
        .mobile-toggle:active { transform: scale(0.95); }

        .hamburger-icon {
            width: 20px;
            height: 14px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .hamburger-icon span {
            display: block;
            width: 100%;
            height: 2px;
            background: var(--text);
            border-radius: 2px;
            transition: all var(--transition);
        }

        .sidebar-backdrop {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            z-index: 999;
            opacity: 0;
            transition: opacity 300ms ease-out;
        }
        .sidebar-backdrop.show { opacity: 1; }

        /* ============ LEAFLET OVERRIDES ============ */
        .leaflet-control-zoom a {
            background: var(--bg-card) !important;
            color: var(--text) !important;
            border-color: var(--border) !important;
            width: 36px !important;
            height: 36px !important;
            line-height: 36px !important;
            font-size: 16px !important;
            border-radius: var(--radius-sm) !important;
            transition: all var(--transition);
        }
        .leaflet-control-zoom a:hover {
            background: var(--bg-hover) !important;
        }
        .leaflet-control-zoom {
            border: none !important;
            border-radius: var(--radius-md) !important;
            overflow: hidden;
            box-shadow: var(--shadow-md) !important;
        }

        .leaflet-control-attribution {
            background: rgba(10,15,26,0.8) !important;
            color: var(--text-dim) !important;
            font-size: 10px !important;
            backdrop-filter: blur(8px);
        }
        .leaflet-control-attribution a { color: var(--text-secondary) !important; }

        .leaflet-tooltip {
            background: rgba(19,26,43,0.95) !important;
            border: 1px solid var(--border-light) !important;
            color: var(--text) !important;
            border-radius: var(--radius-sm) !important;
            box-shadow: var(--shadow-md) !important;
            font-family: 'Inter', sans-serif !important;
            font-size: 12px !important;
            padding: 6px 10px !important;
            backdrop-filter: blur(12px);
        }
        .leaflet-tooltip-top:before { border-top-color: rgba(19,26,43,0.95) !important; }

        /* ============ LOCATE BUTTON ============ */
        .locate-btn {
            position: absolute;
            bottom: 100px;
            right: 12px;
            z-index: 800;
            width: 36px;
            height: 36px;
            border-radius: var(--radius-sm);
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow-md);
            transition: all var(--transition);
        }
        .locate-btn:hover, .mapstyle-btn:hover { background: var(--bg-hover); }
        .locate-btn:active, .mapstyle-btn:active { transform: scale(0.95); }
        .locate-btn.active { color: var(--primary); }
        .locate-btn.loading svg { animation: spin 1s linear infinite; }

        .mapstyle-btn {
            position: absolute;
            bottom: 145px;
            right: 12px;
            z-index: 800;
            width: 36px;
            height: 36px;
            border-radius: var(--radius-sm);
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow-md);
            transition: all var(--transition);
        }

        .user-location-pulse {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: rgba(56,189,248,0.25);
            border: 3px solid var(--primary);
            box-shadow: 0 0 12px rgba(56,189,248,0.4);
            animation: locationPulse 2s ease-in-out infinite;
        }
        @keyframes locationPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(56,189,248,0.4); }
            50% { box-shadow: 0 0 0 10px rgba(56,189,248,0); }
        }

        /* ============ REDUCED MOTION ============ */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
            .refresh-progress-fill { transition: none; }
        }

        /* ============ MOBILE ============ */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                bottom: 0;
                width: min(340px, 85vw);
                transform: translateX(-100%);
                transition: transform 350ms cubic-bezier(0.4, 0, 0.2, 1);
                box-shadow: none;
                z-index: 1001;
            }
            .sidebar.open {
                transform: translateX(0);
                box-shadow: var(--shadow-lg);
            }

            .mobile-toggle { display: flex; }
            .sidebar-backdrop { display: block; pointer-events: none; }
            .sidebar-backdrop.show { pointer-events: auto; }
            .sidebar-close { display: flex; align-items: center; justify-content: center; }

            .toggle-btn { padding: 8px 6px; font-size: 0.72rem; }
            .bus-item { padding: 10px; }
            .bus-icon { width: 36px; height: 36px; }

            .leaflet-control-zoom {
                margin-right: 12px !important;
                margin-bottom: calc(12px + env(safe-area-inset-bottom, 0px)) !important;
            }

            .leaflet-control-attribution {
                padding-bottom: env(safe-area-inset-bottom, 0px) !important;
            }
        }

        /* Landscape phones */
        @media (max-width: 768px) and (max-height: 500px) {
            .sidebar { width: min(260px, 60vw); }
            .sidebar-header { padding: 12px 16px 10px; }
            .brand-text h1 { font-size: 0.95rem; }
            .controls { padding: 8px 14px; gap: 6px; }
            .bus-item { padding: 8px 10px; min-height: 44px; }
            .bus-icon { width: 30px; height: 30px; font-size: 0.9rem; }
            .refresh-bar { padding: 6px 14px; }
            .stat-card { padding: 6px 8px; }
            .stat-card .stat-value { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <button class="mobile-toggle" onclick="toggleSidebar()" aria-label="Open menu">
        <div class="hamburger-icon">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </button>
    <div class="sidebar-backdrop" onclick="toggleSidebar()"></div>

    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-title-row">
                <div class="sidebar-brand">
                    <div class="brand-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M8 6v6"/><path d="M16 6v6"/><path d="M2 12h19.6"/>
                            <path d="M18 18h3s.5-1.7.8-2.8c.1-.4.2-.8.2-1.2 0-.4-.1-.8-.2-1.2l-1.4-5C20.1 6.8 19.1 6 18 6H4a2 2 0 0 0-2 2v10h3"/>
                            <circle cx="7" cy="18" r="2"/><circle cx="17" cy="18" r="2"/>
                        </svg>
                    </div>
                    <div class="brand-text">
                        <h1>Cyprus Bus Tracker</h1>
                        <div class="live-badge">
                            <span class="live-dot"></span>
                            Live Tracking
                        </div>
                    </div>
                </div>
                <button class="sidebar-close" onclick="closeSidebar()" aria-label="Close menu">&times;</button>
            </div>
            <div class="stats-row">
                <div class="stat-card">
                    <div class="stat-value" id="busCount">0</div>
                    <div class="stat-label">Buses</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="routeCount">0</div>
                    <div class="stat-label">Routes</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="lastUpdate">--</div>
                    <div class="stat-label">Updated</div>
                </div>
            </div>
        </div>

        <div class="error-banner" id="errorBanner"></div>

        <div class="controls">
            <div class="search-wrapper">
                <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
                </svg>
                <input type="text" class="search-box" id="searchBox" placeholder="Search vehicle or route...">
            </div>
            <div class="toggle-row">
                <button class="toggle-btn active" id="toggleStops" onclick="toggleStops()">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
                    Stops
                </button>
                <button class="toggle-btn active" id="toggleMoving" onclick="toggleMovingFilter()">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 17H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2h-1"/><polygon points="12 15 17 21 7 21 12 15"/></svg>
                    Moving
                </button>
                <button class="toggle-btn active" id="toggleStopped" onclick="toggleStoppedFilter()">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 9h6v6H9z"/></svg>
                    Stopped
                </button>
            </div>
            <div class="region-filters" id="regionFilters"></div>
        </div>

        <div class="bus-list" id="busList">
            <div class="loading"><div class="spinner"></div> Loading buses...</div>
        </div>

        <div class="refresh-section">
            <div class="refresh-progress"><div class="refresh-progress-fill" id="refreshProgress"></div></div>
            <div class="refresh-bar">
                <span>Auto-refresh</span>
                <span>Next in <span class="countdown" id="countdown">15</span>s</span>
            </div>
        </div>
    </aside>

    <div class="map-container">
        <div id="map"></div>
        <button class="mapstyle-btn" id="mapStyleBtn" onclick="toggleMapStyle()" aria-label="Toggle map style">
            <svg id="mapStyleIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/>
            </svg>
        </button>
        <button class="locate-btn" id="locateBtn" onclick="locateUser()" aria-label="Go to my location">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="4"/><path d="M12 2v4"/><path d="M12 18v4"/><path d="M2 12h4"/><path d="M18 12h4"/>
            </svg>
        </button>
    </div>

    <script>
    // ============ SIDEBAR TOGGLE ============
    function toggleSidebar() {
        const sidebar = document.querySelector('.sidebar');
        const backdrop = document.querySelector('.sidebar-backdrop');
        const isOpen = sidebar.classList.toggle('open');
        backdrop.classList.toggle('show', isOpen);
    }

    function closeSidebar() {
        document.querySelector('.sidebar').classList.remove('open');
        document.querySelector('.sidebar-backdrop').classList.remove('show');
    }

    // ============ CONFIGURATION ============
    const REFRESH_INTERVAL = 15; // seconds
    const API_URL = '/api/vehicles';
    const STOPS_URL = '/api/stops';
    const GTFS_STOPS_URL = '/api/gtfs-stops';
    const CYPRUS_CENTER = [35.0, 33.4];
    const DEFAULT_ZOOM = 9;

    // Region colors based on route prefix
    const REGIONS = {
        'Nicosia':   { prefixes: ['501', '502', '503', '504', '505', '405'], color: '#38bdf8', icon: 'N' },
        'Limassol':  { prefixes: ['151', '152'], color: '#4ade80', icon: 'L' },
        'Larnaca':   { prefixes: ['201', '202', '203', '204'], color: '#fbbf24', icon: 'R' },
        'Paphos':    { prefixes: ['300', '301', '302', '303'], color: '#f87171', icon: 'P' },
        'Famagusta': { prefixes: ['400', '401', '402', '403'], color: '#a78bfa', icon: 'F' },
        'Intercity': { prefixes: ['150', '155'], color: '#fb923c', icon: 'I' },
    };

    function getRegion(routeId) {
        if (!routeId) return { name: 'Unknown', color: '#64748b', icon: '?' };
        for (const [name, cfg] of Object.entries(REGIONS)) {
            if (cfg.prefixes.some(p => routeId.startsWith(p))) {
                return { name, color: cfg.color, icon: cfg.icon };
            }
        }
        // Fallback heuristics
        if (routeId.startsWith('5') && routeId.length <= 8) return { name: 'Nicosia', color: REGIONS.Nicosia.color, icon: 'N' };
        if (routeId.startsWith('2')) return { name: 'Larnaca', color: REGIONS.Larnaca.color, icon: 'R' };
        if (routeId.startsWith('3')) return { name: 'Paphos', color: REGIONS.Paphos.color, icon: 'P' };
        if (routeId.startsWith('4')) return { name: 'Famagusta', color: REGIONS.Famagusta.color, icon: 'F' };
        if (routeId.startsWith('15')) return { name: 'Limassol', color: REGIONS.Limassol.color, icon: 'L' };
        return { name: 'Other', color: '#64748b', icon: '?' };
    }

    // ============ STATE ============
    let map, busMarkers = {}, stopMarkerMap = {}, stopsLayer = null;
    let allBuses = [];
    let allTripUpdates = [];
    let allStopsMap = {};
    let allStopsArray = [];    // all loaded stops for re-filtering
    let gtfsStopsMap = {};     // GTFS stop_id -> {lat, lon, name} for route drawing
    let stopCodeToGtfsId = {}; // CSV stop_code -> GTFS stop_id (reverse lookup)
    let routeStopsIndex = {};  // route_id -> Set<stop_id> built from all trip_updates
    let stopRegionsIndex = {}; // gtfs_stop_id -> Set<regionName> built from routeStopsIndex

    // Load saved filters from localStorage (or use defaults)
    const savedFilters = (() => {
        try { return JSON.parse(localStorage.getItem('busTrackerFilters')); } catch { return null; }
    })();
    let showStops = savedFilters?.showStops ?? true;
    let showMoving = savedFilters?.showMoving ?? true;
    let showStopped = savedFilters?.showStopped ?? true;
    let activeRegions = new Set(savedFilters?.activeRegions ?? Object.keys(REGIONS).concat(['Other']));
    let selectedBusId = null;
    let routeLayer = null;       // L.layerGroup for the active bus route polyline
    let activeRouteBusId = null; // which bus's route is currently drawn
    let countdown = REFRESH_INTERVAL;

    // ============ MAP INIT ============
    map = L.map('map', {
        center: CYPRUS_CENTER,
        zoom: DEFAULT_ZOOM,
        zoomControl: false,
    });

    L.control.zoom({ position: 'bottomright' }).addTo(map);

    // Map tile layers
    const savedMapStyle = localStorage.getItem('busTrackerMapStyle') || 'satellite';
    let currentMapStyle = savedMapStyle;

    const tileLayers = {
        satellite: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: '&copy; Esri, Maxar, Earthstar Geographics',
            maxZoom: 19,
        }),
        dark: L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>',
            subdomains: 'abcd',
            maxZoom: 19,
        }),
    };

    const labelsOverlay = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_only_labels/{z}/{x}/{y}{r}.png', {
        attribution: '',
        subdomains: 'abcd',
        maxZoom: 19,
        pane: 'overlayPane',
    });

    // Apply initial map style
    tileLayers[currentMapStyle].addTo(map);
    if (currentMapStyle === 'satellite') labelsOverlay.addTo(map);
    updateMapStyleIcon();

    // Clear route line when clicking on the map background (not a bus)
    let _busClicked = false;
    map.on('click', () => {
        if (_busClicked) { _busClicked = false; return; }
        if (activeRouteBusId) {
            clearBusRoute();
            selectedBusId = null;
            updateBusList();
        }
    });

    // ============ BUS MARKER CREATION ============
    function createBusIcon(vehicle) {
        const region = getRegion(vehicle.route_id);
        const isMoving = vehicle.speed > 1;
        const rotation = vehicle.bearing || 0;

        return L.divIcon({
            className: '',
            html: `<div class="bus-marker ${isMoving ? 'moving' : ''}" style="background:${region.color}; transform: rotate(${rotation}deg);">
                ${region.icon}
            </div>`,
            iconSize: [28, 33],
            iconAnchor: [14, 33],
            popupAnchor: [0, -35],
        });
    }

    function createBusPopup(v) {
        const region = getRegion(v.route_id);
        const time = v.timestamp ? new Date(v.timestamp * 1000).toLocaleTimeString('el-GR') : '--';
        const speed = v.speed > 0 ? `${v.speed} km/h` : 'Stopped';
        const bearing = v.bearing > 0 ? `${v.bearing}\u00B0` : '--';

        return `<div class="popup-content">
            <h3><span style="color:${region.color}"><svg width="18" height="18" viewBox="0 0 24 24" fill="${region.color}" stroke="none"><path d="M8 6v6M16 6v6M2 12h19.6M18 18h3s.5-1.7.8-2.8c.1-.4.2-.8.2-1.2 0-.4-.1-.8-.2-1.2l-1.4-5C20.1 6.8 19.1 6 18 6H4a2 2 0 0 0-2 2v10h3M7 18a2 2 0 1 0 0-4 2 2 0 0 0 0 4ZM17 18a2 2 0 1 0 0-4 2 2 0 0 0 0 4Z"/></svg></span> ${v.label}</h3>
            <div class="popup-grid">
                <span class="label">Region</span><span class="value" style="color:${region.color}">${region.name}</span>
                <span class="label">Route</span><span class="value">${v.route_id}</span>
                <span class="label">Speed</span><span class="value">${speed}</span>
                <span class="label">Updated</span><span class="value">${time}</span>
            </div>
        </div>`;
    }

    // ============ UPDATE BUSES ============
    function updateBuses(vehicles) {
        allBuses = vehicles;
        const currentIds = new Set(vehicles.map(v => v.id));

        // Remove markers for buses no longer present
        Object.keys(busMarkers).forEach(id => {
            if (!currentIds.has(id)) {
                map.removeLayer(busMarkers[id]);
                delete busMarkers[id];
            }
        });

        // Update or create markers
        vehicles.forEach(v => {
            const visible = shouldShowBus(v);

            if (busMarkers[v.id]) {
                const marker = busMarkers[v.id];
                if (visible) {
                    marker.setLatLng([v.lat, v.lon]);
                    marker.setIcon(createBusIcon(v));
                    marker.setPopupContent(createBusPopup(v));
                    if (!map.hasLayer(marker)) marker.addTo(map);
                } else {
                    if (map.hasLayer(marker)) map.removeLayer(marker);
                }
            } else {
                if (visible) {
                    const marker = L.marker([v.lat, v.lon], { icon: createBusIcon(v) });
                    marker.bindPopup(createBusPopup(v), { maxWidth: 280 });
                    marker.on('click', () => { _busClicked = true; selectBus(v.id); });
                    marker.addTo(map);
                    busMarkers[v.id] = marker;
                }
            }
        });

        // Refresh route line if one is active
        if (activeRouteBusId) {
            if (currentIds.has(activeRouteBusId)) {
                // Bus still exists — redraw with updated trip data
                const prevId = activeRouteBusId;
                clearBusRoute();
                showBusRoute(prevId);
            } else {
                clearBusRoute();
            }
        }

        updateBusList();
        updateStats();
    }

    function shouldShowBus(v) {
        const region = getRegion(v.route_id);
        if (!activeRegions.has(region.name)) return false;
        if (!showMoving && v.speed > 1) return false;
        if (!showStopped && v.speed <= 1) return false;

        const search = document.getElementById('searchBox').value.toLowerCase();
        if (search) {
            const match = (v.label || '').toLowerCase().includes(search) ||
                          (v.route_id || '').toLowerCase().includes(search) ||
                          region.name.toLowerCase().includes(search);
            if (!match) return false;
        }
        return true;
    }

    // ============ BUS LIST ============
    function updateBusList() {
        const list = document.getElementById('busList');
        const filtered = allBuses.filter(shouldShowBus);

        if (filtered.length === 0) {
            list.innerHTML = `<div class="loading" style="color: var(--text-dim); font-size: 0.85rem;">No buses match your filters</div>`;
            return;
        }

        // Sort: moving first, then by label
        filtered.sort((a, b) => {
            if ((a.speed > 1) !== (b.speed > 1)) return b.speed > 1 ? 1 : -1;
            return (a.label || '').localeCompare(b.label || '');
        });

        list.innerHTML = filtered.map(v => {
            const region = getRegion(v.route_id);
            const speedClass = v.speed <= 1 ? 'stopped' : v.speed > 50 ? 'fast' : '';
            const speedText = v.speed > 1 ? `${v.speed} km/h` : 'Stopped';
            const selected = v.id === selectedBusId ? 'selected' : '';

            return `<div class="bus-item ${selected}" onclick="focusBus('${v.id}')" data-id="${v.id}">
                <div class="bus-icon" style="background:${region.color}15; color:${region.color}; border-radius: 10px;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M8 6v6"/><path d="M16 6v6"/><path d="M2 12h19.6"/>
                        <path d="M18 18h3s.5-1.7.8-2.8c.1-.4.2-.8.2-1.2 0-.4-.1-.8-.2-1.2l-1.4-5C20.1 6.8 19.1 6 18 6H4a2 2 0 0 0-2 2v10h3"/>
                        <circle cx="7" cy="18" r="2"/><circle cx="17" cy="18" r="2"/>
                    </svg>
                </div>
                <div class="bus-info">
                    <div class="bus-label">${v.label || v.id}</div>
                    <div class="bus-route">${region.name} &bull; Route ${v.route_id}</div>
                </div>
                <div class="bus-speed ${speedClass}">${speedText}</div>
            </div>`;
        }).join('');
    }

    function updateStats() {
        const visible = allBuses.filter(shouldShowBus);
        const routes = new Set(visible.map(v => v.route_id));
        document.getElementById('busCount').textContent = visible.length;
        document.getElementById('routeCount').textContent = routes.size;
    }

    // ============ INTERACTIONS ============
    function focusBus(id) {
        selectedBusId = id;
        const v = allBuses.find(b => b.id === id);
        if (v && busMarkers[id]) {
            map.flyTo([v.lat, v.lon], 15, { duration: 0.8 });
            busMarkers[id].openPopup();
        }
        showBusRoute(id);
        updateBusList();
        closeSidebar();
    }

    function selectBus(id) {
        selectedBusId = id;
        showBusRoute(id);
        updateBusList();
        const item = document.querySelector(`.bus-item[data-id="${id}"]`);
        if (item) item.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    // ============ BUS ROUTE DISPLAY ============
    // Decode Google-style encoded polyline (used by OSRM)
    function decodePolyline(encoded) {
        const points = [];
        let idx = 0, lat = 0, lng = 0;
        while (idx < encoded.length) {
            let b, shift = 0, result = 0;
            do { b = encoded.charCodeAt(idx++) - 63; result |= (b & 0x1f) << shift; shift += 5; } while (b >= 0x20);
            lat += (result & 1) ? ~(result >> 1) : (result >> 1);
            shift = 0; result = 0;
            do { b = encoded.charCodeAt(idx++) - 63; result |= (b & 0x1f) << shift; shift += 5; } while (b >= 0x20);
            lng += (result & 1) ? ~(result >> 1) : (result >> 1);
            points.push([lat / 1e5, lng / 1e5]);
        }
        return points;
    }

    // Cache OSRM results so re-drawing on refresh doesn't re-fetch
    const routeCache = {};

    function clearBusRoute() {
        if (routeLayer) {
            map.removeLayer(routeLayer);
            routeLayer = null;
        }
        activeRouteBusId = null;
    }

    function showBusRoute(busId) {
        // Toggle off if clicking the same bus
        if (activeRouteBusId === busId) {
            clearBusRoute();
            return;
        }
        clearBusRoute();

        const bus = allBuses.find(b => b.id === busId);
        if (!bus) return;

        // Find the trip's stop sequence
        let tripStops = null;
        let cacheKey = null;

        // 1) Try exact trip_id match
        const tu = allTripUpdates.find(t => t.trip_id === bus.trip_id);
        if (tu && tu.stops && tu.stops.length > 0) {
            tripStops = tu.stops;
            cacheKey = tu.trip_id;
        }

        // 2) Fallback: any trip_update on the same route_id
        if (!tripStops && bus.route_id) {
            const fallback = allTripUpdates.find(
                t => t.route_id === bus.route_id && t.stops && t.stops.length > 0
            );
            if (fallback) {
                tripStops = fallback.stops;
                cacheKey = fallback.trip_id;
            }
        }

        if (!tripStops || tripStops.length < 2) return;

        // Map stop_ids to coordinates (try GTFS stops first, fall back to CSV stops)
        const coords = [];
        const stopPoints = [];
        for (const s of tripStops) {
            const sp = gtfsStopsMap[s.stop_id] || allStopsMap[s.stop_id];
            if (!sp) continue;
            coords.push([sp.lat, sp.lon]);
            stopPoints.push(sp);
        }
        if (coords.length < 2) return;

        const region = getRegion(bus.route_id || '');
        const color = region.color;
        activeRouteBusId = busId;

        // Draw the route (from cache or OSRM)
        if (cacheKey && routeCache[cacheKey]) {
            drawRoute(routeCache[cacheKey], stopPoints, color);
        } else {
            // Show straight-line immediately while OSRM loads
            drawRoute(coords, stopPoints, color);
            fetchOSRMRoute(coords, cacheKey, stopPoints, color);
        }
    }

    function fetchOSRMRoute(coords, cacheKey, stopPoints, color) {
        // OSRM expects lon,lat format (not lat,lon)
        const waypoints = coords.map(c => `${c[1]},${c[0]}`).join(';');
        const url = `https://router.project-osrm.org/route/v1/driving/${waypoints}?overview=full&geometries=polyline`;

        fetch(url)
            .then(r => r.json())
            .then(data => {
                if (data.code !== 'Ok' || !data.routes || !data.routes[0]) return;
                const roadCoords = decodePolyline(data.routes[0].geometry);
                if (cacheKey) routeCache[cacheKey] = roadCoords;
                // Only redraw if this bus is still the active one
                if (activeRouteBusId && allBuses.find(b => b.id === activeRouteBusId)) {
                    drawRoute(roadCoords, stopPoints, color);
                }
            })
            .catch(() => { /* keep straight-line fallback */ });
    }

    function drawRoute(routeCoords, stopPoints, color) {
        if (routeLayer) map.removeLayer(routeLayer);
        routeLayer = L.layerGroup();

        // Dark outline for contrast on the dark map
        routeLayer.addLayer(L.polyline(routeCoords, {
            color: '#000',
            weight: 7,
            opacity: 0.5,
            lineCap: 'round',
            lineJoin: 'round',
            interactive: false,
        }));

        // Bright colored route line on top
        routeLayer.addLayer(L.polyline(routeCoords, {
            color: color,
            weight: 5,
            opacity: 0.9,
            lineCap: 'round',
            lineJoin: 'round',
            interactive: false,
        }));

        // Stop dots along the route
        for (const sp of stopPoints) {
            routeLayer.addLayer(L.circleMarker([sp.lat, sp.lon], {
                radius: 5,
                fillColor: color,
                fillOpacity: 1,
                color: '#fff',
                weight: 2,
                interactive: false,
            }));
        }

        routeLayer.addTo(map);
    }

    // ============ STOP ARRIVALS ============
    function haversineKm(lat1, lon1, lat2, lon2) {
        const R = 6371;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat / 2) ** 2 +
                  Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                  Math.sin(dLon / 2) ** 2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    // Convert a CSV stop code to the GTFS stop_id used in trip_updates
    function toGtfsStopId(csvCode) {
        return stopCodeToGtfsId[csvCode] || csvCode;
    }

    // Look up stop coordinates by GTFS stop_id (with CSV fallback)
    function getStopCoords(gtfsStopId) {
        return gtfsStopsMap[gtfsStopId] || allStopsMap[gtfsStopId];
    }

    function getScheduledArrivals(stopCode) {
        const gtfsId = toGtfsStopId(stopCode);
        const now = Math.floor(Date.now() / 1000);
        const arrivals = [];
        for (const tu of allTripUpdates) {
            for (const s of tu.stops) {
                if (s.stop_id === gtfsId) {
                    const time = s.arrival || s.departure;
                    if (time && time > now) {
                        arrivals.push({
                            route_id: tu.route_id,
                            vehicle: tu.vehicle,
                            eta_min: Math.round((time - now) / 60),
                            source: 'scheduled',
                        });
                    }
                    break;
                }
            }
        }
        arrivals.sort((a, b) => a.eta_min - b.eta_min);
        return arrivals.slice(0, 5);
    }

    function bearingBetween(lat1, lon1, lat2, lon2) {
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const lat1r = lat1 * Math.PI / 180;
        const lat2r = lat2 * Math.PI / 180;
        const y = Math.sin(dLon) * Math.cos(lat2r);
        const x = Math.cos(lat1r) * Math.sin(lat2r) -
                  Math.sin(lat1r) * Math.cos(lat2r) * Math.cos(dLon);
        return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
    }

    // Build a global index: route_id -> Set of all stop_ids that route serves
    // Also builds stopRegionsIndex: stop_id -> Set<regionName>
    function buildRouteStopsIndex() {
        routeStopsIndex = {};
        for (const tu of allTripUpdates) {
            if (!tu.route_id || !tu.stops) continue;
            if (!routeStopsIndex[tu.route_id]) {
                routeStopsIndex[tu.route_id] = new Set();
            }
            for (const s of tu.stops) {
                routeStopsIndex[tu.route_id].add(s.stop_id);
            }
        }

        // Build reverse index: stop_id -> which regions serve it
        stopRegionsIndex = {};
        for (const [routeId, stopIds] of Object.entries(routeStopsIndex)) {
            const region = getRegion(routeId);
            for (const sid of stopIds) {
                if (!stopRegionsIndex[sid]) stopRegionsIndex[sid] = new Set();
                stopRegionsIndex[sid].add(region.name);
            }
        }

        // Re-filter visible stops whenever the index is rebuilt
        filterStopsByRegion();
    }

    function getNearbyBuses(stop) {
        const MAX_RADIUS_KM = 8;
        const AT_STOP_KM = 0.25;       // within 250m = "at the stop"
        const CLOSE_KM = 0.5;          // within 500m = skip bearing check
        const DWELL_PER_STOP_MIN = 0.5; // 30s dwell per intermediate stop
        const nearby = [];

        // Build trip_id -> trip_update lookup
        const tripMap = {};
        for (const tu of allTripUpdates) {
            if (tu.trip_id) tripMap[tu.trip_id] = tu;
        }

        // Convert the CSV stop code to GTFS stop_id for matching against trip_updates
        const gtfsId = toGtfsStopId(stop.code);

        // Check if a bus's route is known to serve this stop using the global index
        function routeServesStop(routeId) {
            const stops = routeStopsIndex[routeId];
            return stops ? stops.has(gtfsId) : false;
        }

        for (const bus of allBuses) {
            const dist = haversineKm(bus.lat, bus.lon, stop.lat, stop.lon);
            if (dist > MAX_RADIUS_KM) continue;

            const isAtStop = dist < AT_STOP_KM;
            const isClose = dist < CLOSE_KM;

            // Stopped buses: only include if they're at the stop
            if (bus.speed <= 1 && !isAtStop) continue;

            // Route filter: skip buses whose route doesn't serve this stop
            if (!isAtStop && bus.route_id && !routeServesStop(bus.route_id)) {
                continue;
            }

            // Direction check: only for moving buses that aren't very close
            if (bus.speed > 1 && bus.bearing > 0 && !isClose) {
                const headingToStop = bearingBetween(bus.lat, bus.lon, stop.lat, stop.lon);
                const diff = Math.abs(((bus.bearing - headingToStop + 540) % 360) - 180);
                if (diff > 90) continue;
            }

            let stopsAway = null;
            let routeDist = null;
            const tu = tripMap[bus.trip_id];

            if (tu && tu.stops.length > 0) {
                const targetIdx = tu.stops.findIndex(s => s.stop_id === gtfsId);
                if (targetIdx < 0 && !isAtStop) continue;

                if (targetIdx >= 0) {
                    let busStopIdx = 0;
                    let minDist = Infinity;
                    for (let i = 0; i < tu.stops.length; i++) {
                        const sp = getStopCoords(tu.stops[i].stop_id);
                        if (!sp) continue;
                        const d = haversineKm(bus.lat, bus.lon, sp.lat, sp.lon);
                        if (d < minDist) { minDist = d; busStopIdx = i; }
                    }

                    if (busStopIdx > targetIdx && !isAtStop) continue;

                    stopsAway = Math.max(0, targetIdx - busStopIdx);

                    if (stopsAway > 0) {
                        const firstStop = getStopCoords(tu.stops[busStopIdx]?.stop_id);
                        let seqDist = firstStop
                            ? haversineKm(bus.lat, bus.lon, firstStop.lat, firstStop.lon) : 0;
                        for (let i = busStopIdx; i < targetIdx; i++) {
                            const s1 = getStopCoords(tu.stops[i].stop_id);
                            const s2 = getStopCoords(tu.stops[i + 1].stop_id);
                            if (s1 && s2) seqDist += haversineKm(s1.lat, s1.lon, s2.lat, s2.lon);
                        }
                        routeDist = seqDist;
                    }
                }
            }

            // ETA calculation
            let eta_min;
            if (isAtStop) {
                eta_min = 0;
            } else if (bus.speed <= 1) {
                continue;
            } else {
                const travelDist = routeDist !== null ? routeDist : dist * 1.3;
                eta_min = Math.round((travelDist / bus.speed) * 60);

                if (stopsAway !== null && stopsAway > 1) {
                    eta_min += Math.round((stopsAway - 1) * DWELL_PER_STOP_MIN);
                }
            }

            nearby.push({
                route_id: bus.route_id,
                vehicle: bus.label || bus.id,
                dist_km: dist,
                eta_min,
                stops_away: stopsAway,
                at_stop: isAtStop,
                source: 'proximity',
            });
        }

        nearby.sort((a, b) => a.eta_min - b.eta_min);
        return nearby.slice(0, 8);
    }

    function formatEtaMin(min, atStop) {
        if (atStop) return 'Now';
        if (min < 1) return '<1 min';
        if (min < 60) return `~${min} min`;
        const h = Math.floor(min / 60);
        const m = min % 60;
        return `~${h}h ${m}m`;
    }

    function createStopPopup(stop) {
        const name = stop.name_el || stop.name_en || stop.code;

        // Try scheduled data first, fall back to proximity
        let arrivals = getScheduledArrivals(stop.code);
        let isEstimate = false;
        if (arrivals.length === 0) {
            arrivals = getNearbyBuses(stop);
            isEstimate = true;
        }

        let arrivalsHtml;
        if (arrivals.length === 0) {
            arrivalsHtml = '<div class="stop-no-arrivals">No nearby buses found</div>';
        } else {
            arrivalsHtml = arrivals.map(a => {
                const region = getRegion(a.route_id);
                const eta = formatEtaMin(a.eta_min, a.at_stop);
                let detail;
                if (a.source === 'proximity') {
                    if (a.at_stop) {
                        detail = 'At this stop';
                    } else if (a.stops_away !== null) {
                        detail = `${a.stops_away} stop${a.stops_away !== 1 ? 's' : ''} away`;
                    } else {
                        detail = `${a.dist_km.toFixed(1)} km away`;
                    }
                } else {
                    detail = a.vehicle || '--';
                }
                const etaClass = a.at_stop ? 'stop-eta at-stop' : 'stop-eta';
                return `<div class="stop-arrival-row">
                    <span class="stop-route-badge" style="background:${region.color}">${a.route_id}</span>
                    <span class="stop-vehicle">${detail}</span>
                    <span class="${etaClass}">${eta}</span>
                </div>`;
            }).join('');
        }

        const label = isEstimate ? 'Nearby buses (estimated)' : 'Upcoming arrivals';

        return `<div class="stop-popup">
            <div class="stop-popup-header">
                <strong>${name}</strong>
                <span class="stop-popup-code">${stop.code}</span>
            </div>
            <div class="stop-arrivals-label">${label}</div>
            <div class="stop-arrivals-list">${arrivalsHtml}</div>
        </div>`;
    }

    // ============ STOPS ============
    async function loadStops() {
        try {
            const resp = await fetch(STOPS_URL);
            const stops = await resp.json();

            stops.forEach(s => { allStopsMap[s.code] = s; });
            allStopsArray = stops;

            stopsLayer = L.layerGroup();
            stops.forEach(s => {
                const isDark = currentMapStyle === 'dark';
                const marker = L.circleMarker([s.lat, s.lon], {
                    radius: isDark ? 3 : 4,
                    fillColor: isDark ? '#94a3b8' : '#facc15',
                    fillOpacity: isDark ? 0.6 : 0.9,
                    color: isDark ? 'rgba(255,255,255,0.6)' : '#000',
                    weight: isDark ? 1 : 1.5,
                });
                marker.bindTooltip(`<strong>${s.name_el || s.name_en}</strong><br><small>${s.code}</small>`, {
                    direction: 'top',
                    offset: [0, -4],
                });
                marker.bindPopup('', { maxWidth: 260, minWidth: 180 });
                marker.on('click', () => {
                    marker.setPopupContent(createStopPopup(s));
                });
                stopMarkerMap[s.code] = marker;
                stopsLayer.addLayer(marker);
            });

            if (showStops) stopsLayer.addTo(map);
            filterStopsByRegion();
            console.log(`Loaded ${stops.length} stops`);
        } catch (e) {
            console.warn('Could not load stops:', e);
        }
    }

    // Show/hide individual stop markers based on active region filters
    function filterStopsByRegion() {
        if (!stopsLayer) return;
        const allActive = activeRegions.size >= Object.keys(REGIONS).length + 1; // all regions + Other
        const hasIndex = Object.keys(stopRegionsIndex).length > 0;

        for (const [csvCode, marker] of Object.entries(stopMarkerMap)) {
            // Look up GTFS stop ID at filter time (after GTFS data is loaded)
            const gtfsId = toGtfsStopId(csvCode);
            const regions = stopRegionsIndex[gtfsId] || stopRegionsIndex[csvCode];

            let visible;
            if (!hasIndex || allActive) {
                // No trip data yet or all regions active — show all stops
                visible = true;
            } else if (!regions || regions.size === 0) {
                // Stop not served by any known route — show if 'Other' is active
                visible = activeRegions.has('Other');
            } else {
                // Show if any of the stop's regions is active
                visible = [...regions].some(r => activeRegions.has(r));
            }

            if (visible) {
                if (!stopsLayer.hasLayer(marker)) stopsLayer.addLayer(marker);
            } else {
                if (stopsLayer.hasLayer(marker)) stopsLayer.removeLayer(marker);
            }
        }
    }

    // ============ FILTERS ============
    function saveFilters() {
        try {
            localStorage.setItem('busTrackerFilters', JSON.stringify({
                showStops,
                showMoving,
                showStopped,
                activeRegions: [...activeRegions],
            }));
        } catch { /* storage full or unavailable */ }
    }

    function toggleStops() {
        showStops = !showStops;
        document.getElementById('toggleStops').classList.toggle('active', showStops);
        if (stopsLayer) {
            if (showStops) stopsLayer.addTo(map);
            else map.removeLayer(stopsLayer);
        }
        saveFilters();
    }

    function toggleMovingFilter() {
        showMoving = !showMoving;
        document.getElementById('toggleMoving').classList.toggle('active', showMoving);
        refreshFilters();
    }

    function toggleStoppedFilter() {
        showStopped = !showStopped;
        document.getElementById('toggleStopped').classList.toggle('active', showStopped);
        refreshFilters();
    }

    function refreshFilters() {
        updateBuses(allBuses);
        filterStopsByRegion();
        saveFilters();
    }

    // Region filter buttons
    function buildRegionFilters() {
        const container = document.getElementById('regionFilters');
        const allRegions = [...Object.keys(REGIONS), 'Other'];

        container.innerHTML = allRegions.map(name => {
            const color = REGIONS[name]?.color || '#64748b';
            const active = activeRegions.has(name) ? 'active' : '';
            return `<button class="region-btn ${active}" style="background:${color}; color:white;"
                        onclick="toggleRegion('${name}', this)">${name}</button>`;
        }).join('');
    }

    function toggleRegion(name, btn) {
        if (activeRegions.has(name)) {
            activeRegions.delete(name);
            btn.classList.remove('active');
        } else {
            activeRegions.add(name);
            btn.classList.add('active');
        }
        refreshFilters();
    }

    // Search
    document.getElementById('searchBox').addEventListener('input', refreshFilters);

    // ============ DATA FETCHING ============
    async function fetchData() {
        try {
            const resp = await fetch(API_URL);
            if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
            const data = await resp.json();

            if (data.error) {
                showError(data.error);
                return;
            }

            hideError();

            const time = data.timestamp ? new Date(data.timestamp * 1000).toLocaleTimeString('el-GR') : '--';
            document.getElementById('lastUpdate').textContent = time;

            allTripUpdates = data.trip_updates || [];
            buildRouteStopsIndex();
            updateBuses(data.vehicles || []);
        } catch (e) {
            showError(`Connection error: ${e.message}`);
        }
    }

    function showError(msg) {
        const banner = document.getElementById('errorBanner');
        banner.textContent = msg;
        banner.classList.add('show');
    }

    function hideError() {
        document.getElementById('errorBanner').classList.remove('show');
    }

    // ============ REFRESH LOOP ============
    function startRefreshLoop() {
        countdown = REFRESH_INTERVAL;
        updateCountdown();

        setInterval(() => {
            countdown--;
            if (countdown <= 0) {
                countdown = REFRESH_INTERVAL;
                fetchData();
            }
            updateCountdown();
        }, 1000);
    }

    function updateCountdown() {
        document.getElementById('countdown').textContent = countdown;
        const pct = ((REFRESH_INTERVAL - countdown) / REFRESH_INTERVAL) * 100;
        document.getElementById('refreshProgress').style.width = pct + '%';
    }

    // ============ MAP STYLE TOGGLE ============
    function toggleMapStyle() {
        // Remove current base layer
        map.removeLayer(tileLayers[currentMapStyle]);

        if (currentMapStyle === 'satellite') {
            map.removeLayer(labelsOverlay);
            currentMapStyle = 'dark';
        } else {
            currentMapStyle = 'satellite';
        }

        // Add new base layer (at bottom)
        tileLayers[currentMapStyle].addTo(map);
        tileLayers[currentMapStyle].bringToBack();
        if (currentMapStyle === 'satellite') labelsOverlay.addTo(map);

        // Update stop marker style for visibility
        const isDark = currentMapStyle === 'dark';
        for (const marker of Object.values(stopMarkerMap)) {
            marker.setStyle({
                fillColor: isDark ? '#94a3b8' : '#facc15',
                fillOpacity: isDark ? 0.6 : 0.9,
                color: isDark ? 'rgba(255,255,255,0.6)' : '#000',
                weight: isDark ? 1 : 1.5,
            });
        }

        updateMapStyleIcon();
        try { localStorage.setItem('busTrackerMapStyle', currentMapStyle); } catch {}
    }

    function updateMapStyleIcon() {
        const icon = document.getElementById('mapStyleIcon');
        if (currentMapStyle === 'satellite') {
            // Sun icon (satellite/light) — clicking will switch to dark
            icon.innerHTML = '<circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/>';
        } else {
            // Moon icon (dark mode) — clicking will switch to satellite
            icon.innerHTML = '<path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>';
        }
    }

    // ============ GEOLOCATION ============
    let userLocationMarker = null;

    function locateUser() {
        if (!navigator.geolocation) return;

        const btn = document.getElementById('locateBtn');
        btn.classList.add('loading');

        navigator.geolocation.getCurrentPosition(
            (pos) => {
                btn.classList.remove('loading');
                btn.classList.add('active');

                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;

                map.flyTo([lat, lon], 15, { duration: 1 });

                if (userLocationMarker) {
                    userLocationMarker.setLatLng([lat, lon]);
                } else {
                    userLocationMarker = L.marker([lat, lon], {
                        icon: L.divIcon({
                            className: '',
                            html: '<div class="user-location-pulse"></div>',
                            iconSize: [18, 18],
                            iconAnchor: [9, 9],
                        }),
                        zIndexOffset: 1000,
                    }).addTo(map);
                    userLocationMarker.bindTooltip('You are here', {
                        direction: 'top',
                        offset: [0, -12],
                    });
                }
            },
            (err) => {
                btn.classList.remove('loading');
                console.warn('Geolocation error:', err.message);
            },
            { enableHighAccuracy: true, timeout: 10000 }
        );
    }

    // Request location on first load
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
            (pos) => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;
                map.flyTo([lat, lon], 14, { duration: 1.2 });

                document.getElementById('locateBtn').classList.add('active');
                userLocationMarker = L.marker([lat, lon], {
                    icon: L.divIcon({
                        className: '',
                        html: '<div class="user-location-pulse"></div>',
                        iconSize: [18, 18],
                        iconAnchor: [9, 9],
                    }),
                    zIndexOffset: 1000,
                }).addTo(map);
                userLocationMarker.bindTooltip('You are here', {
                    direction: 'top',
                    offset: [0, -12],
                });
            },
            () => { /* user denied or unavailable — stay on Cyprus center */ },
            { enableHighAccuracy: true, timeout: 10000 }
        );
    }

    // ============ INIT ============
    async function loadGtfsStops() {
        try {
            const resp = await fetch(GTFS_STOPS_URL);
            const stops = await resp.json();
            stops.forEach(s => {
                gtfsStopsMap[s.stop_id] = { lat: s.lat, lon: s.lon, name: s.name };
                if (s.stop_code) stopCodeToGtfsId[s.stop_code] = s.stop_id;
            });
        } catch (e) { console.warn('Failed to load GTFS stops:', e); }
    }

    buildRegionFilters();

    // Apply saved filter state to UI buttons
    document.getElementById('toggleStops').classList.toggle('active', showStops);
    document.getElementById('toggleMoving').classList.toggle('active', showMoving);
    document.getElementById('toggleStopped').classList.toggle('active', showStopped);

    fetchData();
    loadStops();
    loadGtfsStops();
    startRefreshLoop();
    </script>
</body>
</html>
